name: Hourly Strategy Cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger strategy cron endpoint
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ]; then
            echo "Missing required secret: CRON_URL"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required secret: CRON_SECRET"
            exit 1
          fi

          curl --fail --show-error --silent \
            --max-time 120 \
            --retry 2 \
            --retry-delay 5 \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$CRON_URL"
